<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <script src="https://sdk.sigilopay.com/v1.0.0/sdk.js"></script>
</head>
<body>
    <h1>Order Summary</h1>
    <div id="order-summary">
        <!-- Example order summary content -->
        <p>Item: Example Product</p>
        <p>Price: $10.00</p>
    </div>

    <h2>Delivery Form</h2>
    <form id="delivery-form">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br>
        <label for="address">Address:</label>
        <input type="text" id="address" name="address" required><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br>
        <button type="submit">Proceed to Payment</button>
    </form>

    <script>
        document.getElementById('delivery-form').onsubmit = function(e) {
            e.preventDefault();
            // Integrate SigiloPay payment here
            const paymentData = { /* your payment data */ };
            SigiloPay.pay(paymentData)
                .then(response => {
                    // Handle successful payment
                    console.log('Payment successful:', response);
                })
                .catch(error => {
                    // Handle payment failure
                    console.error('Payment failed:', error);
                });
        };
    </script>
</body>
</html>
